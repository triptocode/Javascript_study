
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="variable.js"></script>



    <script>
        function btn() {
            var str;

           if   (confirm("확인이나 취소를 눌러주세요!") == true)
                {str = "확인을 눌렀습니다"; } 
           else {str = "취소을 눌렀습니다";  }
            document.getElementById("text1").innerHTML = str;
        }


        function promptDialogBox() {
			var inputStr = prompt("당신의 이름을 입력해 주세요 : ", "홍길동");

			if (inputStr != null) {
				document.getElementById("text2").innerHTML = "당신의 이름은 " + inputStr + "입니다.";
                
			}
		}


   
    </script>

</head>
<body>
        <button onclick="btn()"> 클릭 confirm() </button>
        <p id="text1"></p>

        <button onclick="promptDialogBox()"> 클릭 prompt() </button>
        <p id="text2"> 당신의 이름은 O O O 입니다. </p>

</body>
</html>
